name: Keep QRMenu Alive (6am-10pm)

on:
  schedule:
    # '*/5' nghĩa là mỗi 5 phút
    # '23-23,0-15' nghĩa là từ 23h ngày hôm trước đến 15h ngày hôm sau (theo giờ UTC)
    - cron: '*/5 23-23,0-15 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping QRMenu Server
        run: |
          curl -f https://your-app-name.onrender.com/health || echo "Server might be down or sleeping"